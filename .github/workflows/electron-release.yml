name: Electron Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      npm_config_script_shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-latest
            target: --linux AppImage
            artifact_name: electron-linux
          - name: macos
            os: macos-latest
            target: --mac dmg zip
            artifact_name: electron-macos
          - name: windows
            os: windows-latest
            target: --win nsis zip
            artifact_name: electron-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app bundle
        run: pnpm run build:app

      - name: Resolve app version
        id: app_version
        run: |
          node -e "const fs=require('node:fs');const pkg=require('./package.json');const isTag=process.env.GITHUB_REF_TYPE==='tag';const refName=process.env.GITHUB_REF_NAME||'';const version=isTag&&refName?(refName.startsWith('v')?refName.slice(1):refName):pkg.version;fs.appendFileSync(process.env.GITHUB_OUTPUT,'version='+version+'\n');console.log('Using app version: '+version);"

      - name: Build Electron distributable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ulimit -n 8192 || true
          pnpm exec electron-builder ${{ matrix.platform.target }} --publish never --config.extraMetadata.version=${{ steps.app_version.outputs.version }}

      - name: Build Electron distributable (Windows)
        if: runner.os == 'Windows'
        run: pnpm exec electron-builder ${{ matrix.platform.target }} --publish never --config.extraMetadata.version=${{ steps.app_version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: |
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
